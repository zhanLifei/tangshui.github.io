<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 微信分享卡片设置 -->
    <meta name="wx-share-title" content="萍萍糖水铺">
    <meta name="wx-share-desc" content="一碗糖水，治愈所有的不开心~">
    <meta name="wx-share-img" content="https://mmbiz.qpic.cn/mmbiz_jpg/HQNP92UP7kgA81597iaJic0XDoHYwIuBa3n4T3jxLI5XZOgGPpnjibW3K3GNKaYuiaia4TfBICRxDiaFu7viaZRASriaL0WFKItjt1sHib8gF1VUbOlA/0">

    <!-- 兼容部分版本 Open Graph -->
    <meta property="og:title" content="萍萍糖水铺">
    <meta property="og:description" content="一碗糖水，治愈所有的不开心~">
    <meta property="og:image" content="https://mmbiz.qpic.cn/mmbiz_jpg/HQNP92UP7kgA81597iaJic0XDoHYwIuBa3n4T3jxLI5XZOgGPpnjibW3K3GNKaYuiaia4TfBICRxDiaFu7viaZRASriaL0WFKItjt1sHib8gF1VUbOlA/0">
    <meta property="og:url" content="https://zhanlifei.github.io/tangshui.github.io/">
    <title>萍萍糖水铺</title>
    <!-- 引入jQuery -->
    <script src="./js/jquery-3.6.0.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Microsoft YaHei', sans-serif;
      }

      body {
        background: #f5f5f5;
        max-width: 750px;
        margin: 0 auto;
      }
      .hide {
        display: none;
      }
      /* 页面头部 */
      .shop-header {
        background: #ff4f4f;
        color: #fff;
        padding: 15px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        position: sticky;
        top: 0;
        z-index: 99;
        display: flex;
      }
      .shop-header .title {
        flex: 1;
      }

      /* 主体容器：左分类 + 右商品 */
      .container {
        display: flex;
        height: calc(100vh - 55px);
        overflow: hidden;
      }

      /* 左侧分类栏 */
      .category {
        width: 90px;
        background: #fff;
        overflow-y: auto;
        border-right: 1px solid #eee;
      }

      .category-item {
        padding: 15px 10px;
        text-align: center;
        font-size: 14px;
        color: #333;
        cursor: pointer;
      }

      .category-item.active {
        background: #f5f5f5;
        color: #ff4f4f;
        font-weight: bold;
        border-left: 3px solid #ff4f4f;
      }

      /* 右侧商品列表 */
      .goods-wrap {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
      }

      .goods-title {
        font-size: 16px;
        font-weight: bold;
        margin: 10px 0;
        color: #333;
      }

      .goods-item {
        display: flex;
        background: #fff;
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 10px;
        align-items: center;
      }

      .goods-img {
        width: 70px;
        height: 70px;
        border-radius: 6px;
        object-fit: cover;
        margin-right: 10px;
      }

      .goods-info {
        flex: 1;
      }

      .goods-name {
        font-size: 15px;
        color: #333;
        margin-bottom: 5px;
      }

      .goods-desc {
        font-size: 12px;
        color: #999;
        margin-bottom: 6px;
      }

      .goods-price {
        font-size: 16px;
        color: #ff4f4f;
        font-weight: bold;
      }
      .detail {
        background-color: #fff;
        height: calc(100vh - 55px);
        padding: 10px;
      }
      .detail .title {
        font-weight: 600;
      }
      .detail .remark {
        color: #999;
      }
      .detail p {
        margin-top: 20px;
      }
      .detail img {
        width: 100%;
      }
      /* 弹窗遮罩 */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        z-index: 999;
      }
      /* 底部弹窗容器 */
      .bottom-modal {
        position: fixed;
        bottom: -100%;
        left: 0;
        width: 100%;
        background: white;
        border-radius: 20px 20px 0 0;
        padding: 20px;
        box-sizing: border-box;
        transition: bottom 0.3s ease;
        z-index: 1000;
        max-height: 80vh;
        overflow-y: auto;
      }
      .bottom-modal.show {
        bottom: 0;
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid #eee;
      }
      .modal-title {
        font-size: 18px;
        font-weight: bold;
      }
      .close-btn {
        font-size: 24px;
        cursor: pointer;
        color: #666;
      }
      .calc-row {
        display: flex;
        flex-direction: column;
        margin: 10px 0;
        border-bottom: 1px solid #f5f5f5;
      }
      .total-row {
        color: #ff4444;
      }
      .calc-row label {
        display: inline-block;
        width: 100px;
      }
      .scale-input {
        margin: 5px 0;
      }
      .scale-input label {
        display: inline-block;
        width: 100px;
      }
      .scale-input input {
        width: 100px;
        padding: 5px;
      }
      /* 已登录界面 */
      .main{text-align:center;display:none;padding:20px}
      .main.show{display:block}
      .main h2{margin-bottom:12px;color:#333}
      .main p{color:#666;margin-bottom:20px}
      .logoutBtn{padding:10px 24px;background:#ff4d4f;color:white;border:none;border-radius:8px}

      /* 遮罩 */
      .mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index: 999;}
      .mask.hide{display:none}

      /* 密码框 */
      .lock-box{width:320px;background:#fff;border-radius:16px;overflow:hidden;padding-bottom:12px;position: relative;}
      .paswword-tisp{
        position: absolute;
        font-size: 12px;
        top: 41px;
        width: 100%;
        text-align: center;
        color: #ff4444;
      }
      .lock-title{padding:20px;text-align:center;font-size:16px;color:#333}
      .pwd-input{display:flex;justify-content:center;gap:12px;margin:0 auto 20px;padding:0 20px}
      .dot{width:14px;height:14px;border-radius:50%;border:1px solid #ddd}
      .dot.active{background:#333}

      /* 键盘 */
      .keyboard{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 16px}
      .key{height:56px;display:flex;align-items:center;justify-content:center;font-size:24px;border-radius:12px;background:#f7f8fa;border:none}
      .key:active{background:#e5e6eb}
      .key.del{font-size:16px;color:#666}
    </style>
  </head>
  <body>
    <!-- 头部 -->
    <div class="shop-header">
      <span id="balck_btn" class="hide">返回</span>
      <div class="title">糖水配方</div>
      <span id="calculator_btn" class="hide">计算器</span>
    </div>

    <!-- 主体 -->
    <div class="container">
      <!-- 左侧分类 -->
      <div class="category" id="category_id">
        
      </div>

      <!-- 右侧商品 -->
      <div class="goods-wrap" id="goods_wrap_id">
        
      </div>
    </div>

    <!-- 详情 -->
    <div class="detail hide">
      <div class="title"></div>
      <div class="remark"></div>
      <p></p>
      <img src="" alt="">
    </div>

    <!-- 计算器底部弹窗 -->
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="bottom-modal" id="bottomModal">
      <div class="modal-header">
        <span class="modal-title">配方计算器</span>
        <span class="close-btn" id="closeModal">&times;</span>
      </div>
      <!-- 计算 -->
      <label>请输入换算</label>
      <div id="calcListNew">
       
      </div>
      <div style="display: flex;justify-content: space-between;margin-top: 20px;margin-top: 20px;border-top: 1px solid #ccc;padding: 10px 0 0 0;">
        <div>
          <label>原配方</label>
          <div class="calc-row total-row" id="calcList1"></div>
        </div>
        <div>
          <label>换算后配方</label>
          <div class="calc-row total-row" id="calcList2"></div>
        </div>
      </div>
      
    </div>
    <div class="mask hide" id="mask">
      <div class="lock-box">
        <div class="lock-title">请输入密码</div>
        <div class="paswword-tisp hide"></div>
        <div class="pwd-input">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <div class="keyboard" id="keyboard"></div>
      </div>
    </div>
    <script src="./js/index.js"></script>
    <script src="./js/paswword.js"></script>
  </body>
</html>
